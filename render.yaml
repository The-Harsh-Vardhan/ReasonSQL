# Render Blueprint for ReasonSQL Backend
# Deploy: https://render.com/deploy

services:
  - type: web
    name: reasonsql-api
    runtime: python
    region: oregon
    plan: free
    rootDir: ""  # Explicitly use repo root (where requirements.txt is)
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # ===========================================
      # PRIMARY: Gemini API Keys (for key rotation)
      # ===========================================
      - key: GEMINI_API_KEY
        sync: false  # Set via Render dashboard
      - key: GEMINI_API_KEY_1
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false
      - key: GEMINI_API_KEY_3
        sync: false
      - key: GEMINI_API_KEY_4
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      
      # ===========================================
      # FALLBACK: Groq API Key
      # ===========================================
      - key: GROQ_API_KEY
        sync: false
      
      # ===========================================
      # LLM Configuration
      # ===========================================
      - key: LLM_PROVIDER
        value: gemini
      - key: LLM_MODEL
        value: gemini/gemini-2.0-flash
      - key: GROQ_FALLBACK_MODEL
        value: llama-3.1-8b-instant
      
      # ===========================================
      # Database & System Settings
      # ===========================================
      # PostgreSQL/Supabase connection (production)
      # Project: reasonsql-prod | Region: ap-southeast-1 (Singapore)
      # Set in Render Dashboard → Environment Variables:
      #   DATABASE_URL = postgresql://postgres.cycbtnettmqkoszqepld:<PASSWORD>@aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres
      - key: DATABASE_URL
        sync: false
      # SQLite fallback for local development (ignored if DATABASE_URL is set)
      - key: DATABASE_PATH
        value: ./data/chinook.db
      - key: MAX_RETRIES
        value: "3"
      - key: DEFAULT_LIMIT
        value: "100"
      - key: VERBOSE
        value: "false"
      
      # ===========================================
      # Token Limits (Quota Protection)
      # ===========================================
      - key: MAX_LLM_TOKENS
        value: "1024"
      - key: MAX_LLM_CALLS_PER_QUERY
        value: "5"
      
      # ===========================================
      # CORS & Runtime
      # ===========================================
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: ALLOWED_ORIGINS
        value: "https://reason-sql.vercel.app,https://reasonsql.vercel.app"  # Vercel production domains
      
      # ===========================================
      # LangSmith Observability (Feature B/G)
      # Set LANGCHAIN_API_KEY in Render dashboard
      # ===========================================
      - key: LANGCHAIN_TRACING_V2
        value: "true"
      - key: LANGCHAIN_PROJECT
        value: "reasonsql-prod"
      - key: LANGCHAIN_API_KEY
        sync: false  # Set in Render dashboard → Environment Variables

      # ===========================================
      # Redis Caching (Feature C — Upstash)
      # Create free DB at https://upstash.com
      # Set both in Render dashboard:
      #   UPSTASH_REDIS_REST_URL = https://xxxx.upstash.io
      #   UPSTASH_REDIS_REST_TOKEN = AXxx...
      # ===========================================
      - key: UPSTASH_REDIS_REST_URL
        sync: false  # Set in Render dashboard
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false  # Set in Render dashboard
      - key: CACHE_ENABLED
        value: "true"
      - key: CACHE_TTL_SECONDS
        value: "300"

      # ===========================================
      # Query Settings
      # ===========================================
      - key: QUERY_TIMEOUT_SECONDS
        value: "120"
    
    healthCheckPath: /health
